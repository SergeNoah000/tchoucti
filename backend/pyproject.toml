[tool.ruff]
line-length = 120
target-version = "py311"
exclude = [
    "alembic/versions",
    ".venv",
    "__pycache__",
]

[tool.ruff.lint]
select = ["F"]
ignore = [
    "F401",
    "F541",
    "F841",
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
"alembic/env.py" = ["F401", "F403"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
