services:
  # ============================================
  # PostgreSQL
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: tchoucti_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tchoucti_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tchoucti_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-tchoucti_db}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tchoucti_user} -d ${POSTGRES_DB:-tchoucti_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: tchoucti_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # MinIO (S3-compatible)
  # ============================================
  minio:
    image: minio/minio:latest
    container_name: tchoucti_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_API_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ============================================
  # Mailpit (dev SMTP catcher — UI on :8025)
  # ============================================
  mailpit:
    image: axllent/mailpit:latest
    container_name: tchoucti_mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT:-11025}:1025"   # SMTP
      - "${MAILPIT_UI_PORT:-18025}:8025"     # Web UI
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8025/ > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ============================================
  # Backend FastAPI
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tchoucti_backend
    restart: unless-stopped
    # `.env` is optional — every value below has a working dev default,
    # so a fresh clone runs with `docker compose up` and no setup.
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tchoucti_user}:${POSTGRES_PASSWORD:-tchoucti_dev_password}@postgres:5432/${POSTGRES_DB:-tchoucti_db}
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-key-CHANGE-IN-PRODUCTION}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:13000,http://localhost:3000,http://admin.localhost:13000,http://demo.localhost:13000}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_TLS: ${SMTP_TLS:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@tchoucti.cm}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Tchoucti}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:13000}
    ports:
      - "${BACKEND_PORT:-18000}:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      mailpit:
        condition: service_started
    # Seed the DB if empty (idempotent), then start the API with hot reload.
    command: sh -c "python -m app.db.init_db && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # ============================================
  # Celery worker — meeting reminders + background jobs
  # ============================================
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tchoucti_worker
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tchoucti_user}:${POSTGRES_PASSWORD:-tchoucti_dev_password}@postgres:5432/${POSTGRES_DB:-tchoucti_db}
      REDIS_URL: redis://redis:6379/0
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_TLS: ${SMTP_TLS:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@tchoucti.cm}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Tchoucti}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:13000}
    volumes:
      - ./backend:/app
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2

  # ============================================
  # Celery beat — schedules periodic tasks (every 15 min: reminders)
  # ============================================
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tchoucti_beat
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tchoucti_user}:${POSTGRES_PASSWORD:-tchoucti_dev_password}@postgres:5432/${POSTGRES_DB:-tchoucti_db}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      worker:
        condition: service_started
      redis:
        condition: service_healthy
    command: celery -A app.worker.celery_app beat --loglevel=info

  # ============================================
  # Frontend Next.js
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: tchoucti_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:18000/api}
      NEXT_PUBLIC_ROOT_DOMAIN: ${NEXT_PUBLIC_ROOT_DOMAIN:-localhost}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${FRONTEND_PORT:-13000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:

  postgres_data:
    name: tchoucti_postgres_data
  redis_data:
    name: tchoucti_redis_data
  minio_data:
    name: tchoucti_minio_data
